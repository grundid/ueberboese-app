name: Multi-Platform Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Calculate Semantic Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_tag }}
      previous_version: ${{ steps.semver.outputs.tag }}
      changelog: ${{ steps.semver.outputs.changelog }}
      new_build_number: ${{ steps.version_bump.outputs.new_build_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: minor
          default_prerelease_bump: prerelease
          release_branches: main
          pre_release_branches: develop
          fetch_all_tags: true
          tag_prefix: ''

      - name: Calculate new build number
        id: version_bump
        run: |
          VERSION="${{ steps.semver.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          # Extract build number from current pubspec.yaml
          CURRENT_BUILD=$(grep "^version:" pubspec.yaml | sed 's/.*+//')
          # Increment build number
          NEW_BUILD=$((CURRENT_BUILD + 1))
          echo "new_build_number=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "Previous build: $CURRENT_BUILD"
          echo "New version: $VERSION+$NEW_BUILD"

      - name: Update version files and commit
        run: |
          VERSION="${{ steps.semver.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          NEW_BUILD="${{ steps.version_bump.outputs.new_build_number }}"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: $VERSION+$NEW_BUILD/" pubspec.yaml

          # Create F-Droid changelog directory if it doesn't exist
          mkdir -p metadata/en-US/changelogs

          # Create F-Droid changelog file
          cat > metadata/en-US/changelogs/${NEW_BUILD}.txt <<'EOF'
          ${{ steps.semver.outputs.changelog }}
          EOF

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit the changes
          git add pubspec.yaml metadata/en-US/changelogs/${NEW_BUILD}.txt
          git commit -m "Bump version to $VERSION+$NEW_BUILD"
          git push

  build-android:
    name: Build Signed APK
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.new_version != ''

    steps:
      - name: Checkout code with version bump
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate mock files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          VERSION="${VERSION#v}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ueberboese-app-$VERSION.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/ueberboese-app-*.apk
          retention-days: 90

  build-macos:
    name: Build macOS DMG
    needs: version
    runs-on: macos-latest
    if: needs.version.outputs.new_version != ''

    steps:
      - name: Checkout code with version bump
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate mock files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          VERSION="${VERSION#v}"
          # Install create-dmg
          brew install create-dmg
          # Create DMG
          create-dmg \
            --volname "Überböse App" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 425 120 \
            "ueberboese-app-$VERSION-macos.dmg" \
            "build/macos/Build/Products/Release/ueberboese_app.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dmg
          path: ueberboese-app-*-macos.dmg
          retention-days: 90

  build-linux:
    name: Build Linux Tarball
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.new_version != ''

    steps:
      - name: Checkout code with version bump
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.38.6
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate mock files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux app
        run: flutter build linux --release

      - name: Create tarball
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          VERSION="${VERSION#v}"
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../ueberboese-app-$VERSION-linux-x64.tar.gz .
          cd ../../../../../

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: ueberboese-app-*-linux-x64.tar.gz
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [version, build-android, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code with version bump
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes including version bump
        run: |
          git pull origin ${{ github.ref_name }}
          echo "Current commit SHA: $(git rev-parse HEAD)"
          git log -1 --oneline

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./artifacts

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dmg
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: ./artifacts

      - name: Create Release Tag
        id: create_tag
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          name: Release ${{ needs.version.outputs.new_version }}
          body: ${{ needs.version.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/ueberboese-app-*.apk
            ./artifacts/ueberboese-app-*-macos.dmg
            ./artifacts/ueberboese-app-*-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release ${{ needs.version.outputs.new_version }} created successfully!"
          echo "📦 Android APK uploaded"
          echo "📦 macOS DMG uploaded"
          echo "📦 Linux tarball uploaded"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.version.outputs.new_version }}"

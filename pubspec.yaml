name: ueberboese_app
description: "ueberboese app"
publish_to: "none"
version: 0.30.0+32

environment:
  sdk: ^3.9.0
  flutter: 3.38.6

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  http: ^1.6.0
  xml: ^6.6.1
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  intl: ^0.20.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  build_runner: ^2.11.0
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_monochrome: "assets/icon/app_icon.png"
  ios: false
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  linux:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
